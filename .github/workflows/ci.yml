name: CI

# Three-tier test gate for the syte-seo-suite, on every push to main and
# every PR. Failing any tier blocks merges:
#   1. Node smoke + invariants (parser, image gen, microsite, pipeline,
#      verification, aeoRunner, crawler) — fast, no browser
#   2. Component tests (Vitest + jsdom + Testing Library) — button-wiring
#   3. E2E (Playwright + real Chromium) — full app boot, navigation,
#      regression guard for the Run Scan / pipeline bug class
#   4. Production build — catches import-path / JSX / syntax errors
#      that none of the above hit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: syte-seo-suite

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: syte-seo-suite/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Node smoke + invariant tests
        run: npm run test:node

      - name: Component tests (Vitest + jsdom)
        run: npm run test:components

      - name: Install Playwright browsers
        # Cached automatically across runs because the browser binaries
        # live under ~/.cache/ms-playwright; setup-node keeps node_modules
        # cached and Playwright detects the matching version.
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests (Playwright)
        run: npm run test:e2e

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: syte-seo-suite/test-results/
          retention-days: 7

      - name: Production build
        run: npm run build
