name: AI-QA

# Runs an AI-driven exploratory walkthrough against the deploy preview on
# every PR. Drives a real browser through the Content Engine flow as the
# "Mike — SEO operator" persona, asks Claude (vision) at each step "does
# this look right?", and posts findings as a comment on the PR.
#
# Catches the bug class that scripted tests miss: rendering regressions
# (raw markdown showing as text), missing UI elements, broken layouts,
# and unexpected error states — without needing a hand-written assertion
# for every check.
#
# Required secrets (repo settings):
#   ANTHROPIC_API_KEY   — for the vision calls
#   NETLIFY_PASSWORD    — optional, only if the deploy preview is
#                         password-protected. Sets HTTP basic-auth on
#                         the Playwright browser context.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write   # so we can post the findings comment

jobs:
  walkthrough:
    name: Persona walkthrough
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: syte-seo-suite

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: syte-seo-suite/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for Netlify deploy preview
        id: deploy
        # The Netlify GitHub Action emits a deploy-preview check; we read
        # its target URL from the PR commit's deploy status. Fall back to
        # the conventional URL pattern if the API call fails.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          PR_NUM=${{ github.event.pull_request.number }}
          # Poll the commit statuses for up to 5 min for the netlify deploy.
          for i in $(seq 1 30); do
            URL=$(gh api repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha }}/status \
              --jq '.statuses[] | select(.context=="netlify/syte-seo-suite/deploy-preview") | .target_url' || true)
            if [ -n "$URL" ]; then
              echo "Deploy preview ready: $URL"
              echo "url=$URL" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Waiting for deploy preview... ($i/30)"
            sleep 10
          done
          # Fallback to the conventional URL pattern.
          URL="https://deploy-preview-${PR_NUM}--syte-seo-suite.netlify.app"
          echo "Falling back to: $URL"
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Run AI-QA walkthrough
        id: walkthrough
        env:
          BASE_URL: ${{ steps.deploy.outputs.url }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NETLIFY_PASSWORD: ${{ secrets.NETLIFY_PASSWORD }}
        run: |
          set +e
          node test/ai-qa/walkthrough.mjs > ai-qa-findings.jsonl
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          echo "--- findings ---"
          cat ai-qa-findings.jsonl

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-qa-screenshots
          path: syte-seo-suite/test-results/ai-qa/
          retention-days: 7

      - name: Comment findings on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'syte-seo-suite/test-results/ai-qa/summary.md';
            let body;
            try {
              body = fs.readFileSync(path, 'utf8');
            } catch {
              body = '# AI-QA Walkthrough\n\nNo summary produced — the walkthrough script likely failed before completing. Check the workflow logs.';
            }
            // Find any prior AI-QA comment on this PR and update it instead
            // of stacking new ones each push.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const prior = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('# AI-QA Walkthrough')
            );
            if (prior) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

      - name: Fail the job if any step was flagged
        if: steps.walkthrough.outputs.exit_code != '0'
        run: |
          echo "AI-QA flagged at least one step — see the PR comment + screenshots."
          exit 1
